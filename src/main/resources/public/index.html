<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo 8 - Análisis Predictivo IA</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header class="glass-header">
            <h1>Análisis Predictivo <span class="highlight">IA</span></h1>
            <p>Módulo 8 - Sistema Contable Computarizado</p>
        </header>

        <section class="controls glass-panel">
            <div class="input-group">
                <label for="empresaSelect">Seleccione la Empresa:</label>
                <div class="select-wrapper">
                    <select id="empresaSelect">
                        <option value="">Cargando empresas...</option>
                    </select>
                </div>
            </div>
            <div class="action-buttons">
                <button id="btnAnalizar" class="btn primary" disabled>
                    <span class="btn-text">Ejecutar Análisis</span>
                    <span class="loader hidden"></span>
                </button>
                <button id="btnExportar" class="btn secondary" disabled>
                    Exportar PDF
                </button>
            </div>
        </section>

        <section id="resultsSection" class="results hidden">
            <div class="kpi-grid">
                <div class="kpi-card glass-panel">
                    <h3>Ventas Proyectadas</h3>
                    <div class="kpi-value" id="valVentas">$0.00</div>
                    <div class="kpi-trend" id="trendVentas"></div>
                </div>
                <div class="kpi-card glass-panel">
                    <h3>Compras Proyectadas</h3>
                    <div class="kpi-value" id="valCompras">$0.00</div>
                </div>
                <div class="kpi-card glass-panel">
                    <h3>Utilidad Proyectada</h3>
                    <div class="kpi-value" id="valUtilidad">$0.00</div>
                </div>
                <div class="kpi-card glass-panel">
                    <h3>Nivel de Confianza</h3>
                    <div class="kpi-value conf-badge" id="valConfianza">-</div>
                </div>
            </div>

            <div class="chart-container glass-panel">
                <canvas id="predictionChart"></canvas>
            </div>
        </section>
        
        <div id="errorToast" class="toast hidden"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
